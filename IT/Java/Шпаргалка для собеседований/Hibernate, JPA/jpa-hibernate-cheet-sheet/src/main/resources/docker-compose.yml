services:
  postgres:
    image: postgres:17
    container_name: jpa-hibernate-postgres
    environment:
      POSTGRES_DB: jpa_cheatsheet
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d jpa_cheatsheet"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
